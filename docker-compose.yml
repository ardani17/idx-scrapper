# IDX Scraper API — Docker Compose
#
# Self-contained: Redis included, no external dependencies.
#
# Usage:
#   docker compose up -d --build
#   docker compose logs -f api
#
# All config is embedded — no .env file needed.

services:
  api:
    build: .
    ports:
      - "3100:3100"
    environment:
      - ADMIN_API_KEY=cefa7b54a23eb59345ed4bfc168ddd4e36659718
      - REDIS_URL=redis://redis:6379
      - PORT=3100
      - NODE_ENV=production
      - TZ=Asia/Jakarta
      - LOG_LEVEL=info
      - MAX_BROWSER_PAGES=5
    volumes:
      - api-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # NO host port binding — internal only, no conflict with existing Redis
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  api-data:
  redis-data:
